<html>
<head> 
  <title> my table </title>
  <style>
    table {
      font-family: arial, sans-serif;
      border-collapse: collapse;
      width: 100%;
    }

    td, th {
      border: 1px solid #dddddd;
      text-align: left;
      padding: 8px;
    }

    /* This makes every other row grey */
    tr:nth-child(even) {
      background-color: #dddddd;
    }
  </style> </head>

<body> <h1> My Table </h1>
  <table>
    <tr>
      <th> College Name </th>
      <th> Student Name </th>
      <th> Roll Number </th>
    </tr>
    <tr>
      <td> MITE </td>
      <td> Kavya </td>
      <td> 022 </td>
    </tr>
    <tr>
      <td> MIT </td>
      <td> Prakyth </td>
      <td> 07 </td>
    </tr>
    <tr>
      <td> JSS </td>
      <td> Sudheer </td>
      <td> 09 </td>
    </tr>
  </table>
</body>
</html>
